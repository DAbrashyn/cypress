name: Cypress Tests

on: [push, pull_request]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    container:
      image: cypress/browsers:node-20.9.0-chrome-118.0.5993.88-1-ff-118.0.2-edge-118.0.2088.46-1
     
      options: --ipc=host

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          # Якщо вашому додатку потрібно запустити локальний сервер перед тестами, розкоментуйте рядки нижче:
          # start: npm start
          # wait-on: 'http://localhost:3000'
